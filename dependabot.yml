# Dependabot configuration for Amulet-Laboratories/.github
# This covers the reusable CI workflow's GitHub Actions dependencies.
# Each consuming repo needs its own dependabot.yml for npm/pnpm updates.
#
# Org-wide default config is distributed via repo-level dependabot.yml files
# generated by create-project.sh or added manually.

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"
    open-pull-requests-limit: 5
